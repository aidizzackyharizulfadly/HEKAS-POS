name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test'
        required: false
        default: 'chromium'

# Jangan cancel — E2E harus selesai untuk dapat hasil reliable
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

jobs:
  e2e:
    name: Playwright E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ matrix.browser }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system deps (always)
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: SvelteKit sync
        run: npx svelte-kit sync

      - name: Start dev server (background)
        run: |
          npm run dev &
          echo $! > dev-server.pid
          # Wait for server ready
          for i in {1..30}; do
            if curl -sf http://localhost:5173 > /dev/null; then
              echo "Dev server ready"
              break
            fi
            sleep 2
          done

      - name: Run Playwright tests
        id: tests
        run: npx playwright test --project=${{ matrix.browser }} --reporter=list

      - name: Stop dev server
        if: always()
        run: |
          if [ -f dev-server.pid ]; then
            kill $(cat dev-server.pid) || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Upload HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Annotate test failures
        if: failure()
        uses: dawidd6/action-fail-check@v1
        with:
          pattern: '^(.*Failed.*|.*Error.*|.*Timeout.*)$'
          replace_with: '⚠️ E2E'
