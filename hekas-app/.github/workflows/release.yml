name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Extract section untuk version ini dari PROGRESS.md
          if [ -f PROGRESS.md ]; then
            CHANGELOG=$(awk "/^## .*$VERSION/,/^## /" PROGRESS.md | head -n -1)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changelog=No PROGRESS.md found" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.changelog.outputs.version }}
          generate_release_notes: true
          body: |
            ## 📦 Release ${{ steps.changelog.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ### 📊 Stats

            See [PROGRESS.md](../blob/main/PROGRESS.md) untuk detail lengkap.
          files: |
            build/**/*.js
            build/**/*.css
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
