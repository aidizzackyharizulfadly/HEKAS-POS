version: 2

updates:
  # ============================================================
  # NPM dependencies (weekly)
  # ============================================================
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'Asia/Jakarta'
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - 'dependencies'
      - 'npm'
    groups:
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      framework:
        patterns:
          - '@sveltejs/*'
          - 'svelte'
          - 'vite'
          - 'vitest'
      production-runtime:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'

  # ============================================================
  # GitHub Actions (weekly)
  # ============================================================
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '04:00'
      timezone: 'Asia/Jakarta'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
