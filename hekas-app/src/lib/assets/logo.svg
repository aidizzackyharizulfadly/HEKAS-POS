<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- HEKAS POS logo: monogram "H" + wordmark -->
  <defs>
    <linearGradient id="hekas-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
  </defs>

  <!-- Monogram block -->
  <rect x="4" y="6" width="48" height="48" rx="10" fill="url(#hekas-grad)"/>
  <text x="28" y="42"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="32" font-weight="800" fill="#fff"
        text-anchor="middle" letter-spacing="-1">H</text>

  <!-- Wordmark -->
  <text x="64" y="34"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="800" fill="#0F172A"
        letter-spacing="0.5">HEKAS</text>
  <text x="64" y="50"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="11" font-weight="600" fill="#2563EB"
        letter-spacing="2">POS · RETAIL SUITE</text>
</svg>
